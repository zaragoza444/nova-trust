# Nova Trust production stack — API + Dashboard only (no Z Blockchain).
# Usage:
#   cp deploy/production.env.example deploy/.env.production
#   docker compose -f deploy/docker-compose.production.yml up -d --build

services:
  nova-api:
    image: node:22-bookworm
    restart: unless-stopped
    container_name: nova-api-1
    working_dir: /work
    env_file:
      - .env.production
    environment:
      PORT: "4000"
      NOVA_API_HOST: "0.0.0.0"
      NOVA_CORS_ORIGIN: "http://127.0.0.1:3000"
    command: >-
      bash -lc "npm install && npm run build --workspace @nova/api && node services/api/dist/app.js"
    volumes:
      - ..:/work
    ports:
      - "4000:4000"

  nova-dashboard:
    image: node:22-bookworm
    restart: unless-stopped
    container_name: nova-dashboard-1
    working_dir: /work
    env_file:
      - .env.production
    environment:
      NOVA_API_URL: "http://nova-api:4000"
      PORT: "3000"
    command: >-
      bash -lc "npm install && npm run build --workspace @nova/dashboard && npm run start --workspace @nova/dashboard -- -p 3000 -H 0.0.0.0"
    volumes:
      - ..:/work
    ports:
      - "3000:3000"
    depends_on:
      - nova-api
