# Full Nova Trust production stack — Z Blockchain + API + Dashboard.
# Usage:
#   cp deploy/production.env.example deploy/.env.production
#   docker compose -f deploy/docker-compose.production.yml up -d --build

services:
  z-blockchain:
    image: node:20-alpine
    restart: unless-stopped
    container_name: nova-z-blockchain-1
    command: >-
      npx --yes ganache
      --chain.chainId 44002
      --server.port 8546
      --host 0.0.0.0
      --miner.blockTime 2
      --wallet.totalAccounts 10
      --wallet.mnemonic "test test test test test test test test test test test junk"
    ports:
      - "127.0.0.1:8546:8546"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8546/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_chainId',params:[]})}).then(r=>r.json()).then(j=>process.exit(j.result==='0xabe2'?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  nova-api:
    image: node:22-bookworm
    restart: unless-stopped
    container_name: nova-api-1
    working_dir: /work
    env_file:
      - .env.production
    environment:
      PORT: "4000"
      NOVA_API_HOST: "0.0.0.0"
      NOVA_CORS_ORIGIN: "http://127.0.0.1:3000"
      ZBC_RPC_URL: "http://z-blockchain:8546"
    command: >-
      bash -lc "npm install && npm run build --workspace @nova/api && node services/api/dist/app.js"
    volumes:
      - ..:/work
    ports:
      - "4000:4000"
    depends_on:
      z-blockchain:
        condition: service_healthy

  nova-dashboard:
    image: node:22-bookworm
    restart: unless-stopped
    container_name: nova-dashboard-1
    working_dir: /work
    env_file:
      - .env.production
    environment:
      NOVA_API_URL: "http://nova-api:4000"
      PORT: "3000"
    command: >-
      bash -lc "npm install && npm run build --workspace @nova/dashboard && npm run start --workspace @nova/dashboard -- -p 3000 -H 0.0.0.0"
    volumes:
      - ..:/work
    ports:
      - "3000:3000"
    depends_on:
      - nova-api
