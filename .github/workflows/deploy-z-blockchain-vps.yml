name: Deploy Z Blockchain production

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to deploy
        required: false
        default: cursor/mint-clone-btc-4f28
      mint_btc:
        description: Mint 1M BTC clone
        type: boolean
        default: true
      put_oracle:
        description: Publish oracle prices (includes BTC)
        type: boolean
        default: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Mint 1M BTC clone over SSH
        if: inputs.mint_btc
        env:
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_DEPLOY_BRANCH: ${{ inputs.branch }}
        run: python scripts/remote-mint-clone-btc-vps.py

      - name: Publish oracle prices over SSH
        if: inputs.put_oracle
        env:
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_DEPLOY_BRANCH: ${{ inputs.branch }}
        run: python scripts/remote-put-oracle-prices-vps.py
