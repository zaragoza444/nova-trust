name: Deploy Z Blockchain production (Proxmox hub LXC 5824)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to deploy
        required: false
        default: main
      mint_btc:
        description: Mint 1M BTC clone
        type: boolean
        default: true
      put_oracle:
        description: Publish oracle prices (includes BTC)
        type: boolean
        default: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare Proxmox SSH
        uses: ./.github/actions/vps-deploy-setup
        with:
          vps_ssh_password: ${{ secrets.PROXMOX_SSH_PASSWORD || secrets.VPS_SSH_PASSWORD }}
          vps_ssh_private_key: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY || secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Mint 1M BTC clone on hub LXC 5824
        if: inputs.mint_btc
        env:
          PROXMOX_R630_04_HOST: ${{ secrets.PROXMOX_R630_04_HOST || secrets.PROXMOX_SSH_HOST || secrets.VPS_SSH_HOST }}
          PROXMOX_R630_03_HOST: ${{ secrets.PROXMOX_R630_03_HOST || secrets.PROXMOX_SSH_HOST || secrets.VPS_SSH_HOST }}
          PROXMOX_SSH_HOST: ${{ secrets.PROXMOX_SSH_HOST || secrets.VPS_SSH_HOST }}
          PROXMOX_SSH_USER: ${{ secrets.PROXMOX_SSH_USER || secrets.VPS_SSH_USER || 'root' }}
          PROXMOX_SSH_PASSWORD: ${{ secrets.PROXMOX_SSH_PASSWORD || secrets.VPS_SSH_PASSWORD }}
          PROXMOX_SSH_PRIVATE_KEY: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY || secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_DEPLOY_BRANCH: ${{ inputs.branch }}
        run: python scripts/remote-mint-clone-btc-vps.py

      - name: Publish oracle prices on hub LXC 5824
        if: inputs.put_oracle
        env:
          PROXMOX_R630_04_HOST: ${{ secrets.PROXMOX_R630_04_HOST || secrets.PROXMOX_SSH_HOST || secrets.VPS_SSH_HOST }}
          PROXMOX_R630_03_HOST: ${{ secrets.PROXMOX_R630_03_HOST || secrets.PROXMOX_SSH_HOST || secrets.VPS_SSH_HOST }}
          PROXMOX_SSH_HOST: ${{ secrets.PROXMOX_SSH_HOST || secrets.VPS_SSH_HOST }}
          PROXMOX_SSH_USER: ${{ secrets.PROXMOX_SSH_USER || secrets.VPS_SSH_USER || 'root' }}
          PROXMOX_SSH_PASSWORD: ${{ secrets.PROXMOX_SSH_PASSWORD || secrets.VPS_SSH_PASSWORD }}
          PROXMOX_SSH_PRIVATE_KEY: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY || secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_DEPLOY_BRANCH: ${{ inputs.branch }}
        run: python scripts/remote-put-oracle-prices-vps.py
