name: GitHub Deploy (Z Ecosystem — Proxmox LXC)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to deploy to Proxmox LXC
        required: false
        default: main
      wire_public:
        description: Wire nginx + portal URLs on LXCs (always enabled for Proxmox)
        required: false
        default: "true"
      include_z_bot:
        description: Start Z Bot international trading worker
        required: false
        default: "true"
      proxmox_host:
        description: Proxmox node SSH host fallback (management IP)
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare Proxmox SSH
        uses: ./.github/actions/vps-deploy-setup
        with:
          vps_ssh_password: ${{ secrets.PROXMOX_SSH_PASSWORD || secrets.VPS_SSH_PASSWORD }}
          vps_ssh_private_key: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY || secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Deploy Z Ecosystem to LXC 5820–5828
        env:
          PROXMOX_R630_04_HOST: ${{ secrets.PROXMOX_R630_04_HOST || secrets.PROXMOX_SSH_HOST || secrets.VPS_SSH_HOST }}
          PROXMOX_R630_03_HOST: ${{ secrets.PROXMOX_R630_03_HOST || secrets.PROXMOX_SSH_HOST || secrets.VPS_SSH_HOST }}
          PROXMOX_SSH_HOST: ${{ inputs.proxmox_host || secrets.PROXMOX_SSH_HOST || secrets.VPS_SSH_HOST }}
          PROXMOX_SSH_USER: ${{ secrets.PROXMOX_SSH_USER || secrets.VPS_SSH_USER || 'root' }}
          PROXMOX_SSH_PASSWORD: ${{ secrets.PROXMOX_SSH_PASSWORD || secrets.VPS_SSH_PASSWORD }}
          PROXMOX_SSH_PRIVATE_KEY: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY || secrets.VPS_SSH_PRIVATE_KEY }}
          Z_LXC_BRANCH: ${{ inputs.branch }}
          Z_BOT_AUTO_START: ${{ inputs.include_z_bot }}
        run: python scripts/remote-z-proxmox-deploy.py

      - name: Deployment summary
        run: |
          echo "## Z Ecosystem deployed — Proxmox LXC" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${{ inputs.branch }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Z Chart: http://192.168.11.127/zchart" >> "$GITHUB_STEP_SUMMARY"
          echo "- Z Bot: http://192.168.11.124/zbot" >> "$GITHUB_STEP_SUMMARY"
          echo "- API status: http://192.168.11.126:4100/api/go-live/status" >> "$GITHUB_STEP_SUMMARY"
