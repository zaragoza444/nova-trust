name: Mint BTC clone on VPS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to deploy
        required: false
        default: main

jobs:
  mint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare VPS deploy
        uses: ./.github/actions/vps-deploy-setup
        with:
          vps_ssh_password: ${{ secrets.VPS_SSH_PASSWORD }}
          vps_ssh_private_key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Mint 1M BTC clone over SSH
        env:
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_DEPLOY_BRANCH: ${{ inputs.branch }}
        run: python scripts/remote-mint-clone-btc-vps.py
