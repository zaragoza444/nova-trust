name: Mint clone tokens on VPS

on:
  workflow_dispatch:

jobs:
  mint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Mint clone tokens over SSH
        env:
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_DEPLOY_BRANCH: cursor/tron-multi-network-4f28
        run: python scripts/remote-mint-clone-tokens-vps.py
