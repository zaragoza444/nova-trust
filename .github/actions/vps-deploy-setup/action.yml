name: Proxmox deploy setup
description: Checkout, Python, and validate Proxmox SSH secrets for deploy workflows

runs:
  using: composite
  steps:
    - name: Validate Proxmox SSH secrets
      shell: bash
      env:
        VPS_SSH_PASSWORD: ${{ inputs.vps_ssh_password }}
        VPS_SSH_PRIVATE_KEY: ${{ inputs.vps_ssh_private_key }}
      run: |
        if [ -z "$VPS_SSH_PASSWORD" ] && [ -z "$VPS_SSH_PRIVATE_KEY" ]; then
          echo "::error::Configure repository secrets PROXMOX_SSH_PRIVATE_KEY or PROXMOX_SSH_PASSWORD before running deploy workflows."
          echo "Required: PROXMOX_R630_04_HOST, PROXMOX_R630_03_HOST (management IPs for r630-04 / r630-03)"
          echo "Optional: PROXMOX_SSH_USER (default root), PROXMOX_SSH_HOST (single-host fallback)"
          exit 1
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

inputs:
  vps_ssh_password:
    description: VPS SSH password secret
    required: false
    default: ""
  vps_ssh_private_key:
    description: VPS SSH private key secret
    required: false
    default: ""
