version: "3.9"

x-besu-common: &besu-common
  image: hyperledger/besu:latest
  restart: unless-stopped
  volumes:
    - ./config/genesis.json:/config/genesis.json:ro
    - ./config/permissions_config.toml:/config/permissions_config.toml:ro
    - ./config/static-nodes.json:/config/static-nodes.json:ro
  command:
    - --genesis-file=/config/genesis.json
    - --permissions-nodes-config-file-enabled
    - --permissions-nodes-config-file=/config/permissions_config.toml
    - --rpc-http-enabled
    - --rpc-http-api=ETH,NET,WEB3,ADMIN,QBFT,PERM,TXPOOL
    - --rpc-ws-enabled
    - --host-allowlist=*
    - --metrics-enabled
    - --metrics-host=0.0.0.0
    - --graphql-http-enabled

services:
  bootnode:
    <<: *besu-common
    container_name: nova-bootnode
    command:
      - --genesis-file=/config/genesis.json
      - --p2p-host=0.0.0.0
      - --rpc-http-enabled=false
      - --rpc-ws-enabled=false
      - --metrics-enabled=true
    ports:
      - "30303:30303/tcp"
      - "30303:30303/udp"
      - "9545:9545"

  validator-1:
    <<: *besu-common
    container_name: nova-validator-1
    depends_on: [bootnode]
    ports:
      - "8545:8545"
      - "8546:8546"

  validator-2:
    <<: *besu-common
    container_name: nova-validator-2
    depends_on: [bootnode]

  validator-3:
    <<: *besu-common
    container_name: nova-validator-3
    depends_on: [bootnode]

  validator-4:
    <<: *besu-common
    container_name: nova-validator-4
    depends_on: [bootnode]

  rpc-1:
    <<: *besu-common
    container_name: nova-rpc-1
    depends_on: [validator-1, validator-2, validator-3, validator-4]
    ports:
      - "18545:8545"
      - "18546:8546"

  rpc-2:
    <<: *besu-common
    container_name: nova-rpc-2
    depends_on: [validator-1, validator-2, validator-3, validator-4]
    ports:
      - "28545:8545"
      - "28546:8546"
